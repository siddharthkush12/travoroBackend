<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #00bfa5, #00acc1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 380px;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      animation: scaleIn 0.25s ease-out;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.92);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-top: 12px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #00bfa5;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: #00bfa5;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #009e8e;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: #b2dfdb;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      line-height: 1.4;
    }

    .error {
      color: #d32f2f;
    }

    .success {
      color: #2e7d32;
    }

    @media (max-width: 360px) {
      .card {
        padding: 18px;
      }
      .title {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

<div class="overlay">
  <div class="card">
    <div class="title">Reset Password</div>
    <div class="subtitle">Create a new secure password</div>

    <input
      type="password"
      id="password"
      placeholder="New password"
    />

    <input
      type="password"
      id="confirmPassword"
      placeholder="Confirm password"
    />

    <button id="resetBtn" onclick="resetPassword()">
      Reset Password
    </button>

    <div class="message" id="message"></div>
  </div>
</div>

<script>
  const token = new URLSearchParams(window.location.search).get("token");
  const messageEl = document.getElementById("message");
  const button = document.getElementById("resetBtn");

  if (!token) {
    messageEl.innerText = "Invalid or expired reset link.";
    messageEl.className = "message error";
    button.disabled = true;
  }

  async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirmPassword =
      document.getElementById("confirmPassword").value;

    messageEl.className = "message";

    if (!password || !confirmPassword) {
      messageEl.innerText = "Please fill all fields.";
      messageEl.classList.add("error");
      return;
    }

    if (password.length < 6) {
      messageEl.innerText = "Password must be at least 6 characters.";
      messageEl.classList.add("error");
      return;
    }

    if (password !== confirmPassword) {
      messageEl.innerText = "Passwords do not match.";
      messageEl.classList.add("error");
      return;
    }

    button.disabled = true;
    messageEl.innerText = "Resetting password...";

    try {
      const response = await axios.post(
        `/api/auth/reset-password/${token}`,
        { password },
        { headers: { "Content-Type": "application/json" } }
      );

      if (response.data.success) {
        messageEl.innerText = response.data.message;
        messageEl.classList.add("success");
        setTimeout(() => {
          messageEl.innerText = "You can now close this page.";
        }, 2000);
      } else {
        messageEl.innerText = response.data.message;
        messageEl.classList.add("error");
        button.disabled = false;
      }

    } catch (error) {
      messageEl.innerText =
        error.response?.data?.message ||
        "Something went wrong. Please try again.";
      messageEl.classList.add("error");
      button.disabled = false;
    }
  }
</script>

</body>
</html>
